appId: com.tcgsnipers.app
productName: TCG Snipers
copyright: Copyright © 2026 TCG Snipers

directories:
  output: release
  buildResources: build

releaseInfo:
  releaseNotesFile: build/release-notes.md

files:
  - dist/**
  - electron/dist/**
  # Default electron-builder behavior (omitted "!node_modules/**") includes
  # production dependencies from node_modules — required so electron-updater
  # and its transitive deps are bundled into the asar at runtime.

# Playwright Chromium is installed into artifacts/sniper-bot/playwright-chromium/
# during CI (see .github/workflows/release.yml) and packed here as an
# extraResource so Electron's main process can locate it at runtime via
# process.resourcesPath without relying on users having Chrome installed.
# The directory is placed outside the asar so the binary can be executed.
extraResources:
  - from: playwright-chromium
    to: playwright-chromium
    filter:
      - "**/*"

# The Express API server now runs in-process inside the Electron main bundle
# (see electron/build.mjs). No extraResources needed for a separate api-server
# child process any more.

# PGlite WASM/data files and any native .node addons must live on the real
# filesystem (not inside the asar archive) so they can be mmap'd / dlopen'd.
# electron-builder mirrors the asar path under app.asar.unpacked/ for any
# file matched here, and Electron's module loader transparently redirects
# file:// URLs and require() calls to the unpacked copy.
asarUnpack:
  - "**/*.wasm"
  - "**/*.data"
  - "**/*.node"

win:
  target:
    - target: nsis
      arch:
        - x64
    - target: zip
      arch:
        - x64
  icon: build/icon.ico
  artifactName: TCGSnipers-${version}-${arch}-${os}.${ext}
  # Code signing: electron-builder reads WIN_CSC_LINK (base64-encoded .pfx) and
  # WIN_CSC_KEY_PASSWORD from the environment. When these are absent (local dev)
  # the build proceeds unsigned — Windows Defender may warn but the app runs.
  # signingHashAlgorithms: ["sha256"]

nsis:
  oneClick: false
  # Per-user install: no UAC elevation required. UAC prompts trigger the
  # harshest SmartScreen tier; running without elevation avoids that.
  perMachine: false
  allowElevation: false
  allowToChangeInstallationDirectory: false
  installerHeaderIcon: build/icon.ico
  createDesktopShortcut: true
  createStartMenuShortcut: true
  shortcutName: TCG Snipers
  # Kill any running TCG Snipers (+ bundled node child) before install/uninstall
  # so users don't hit the "app is running" block on upgrade.
  include: build/installer.nsh
  deleteAppDataOnUninstall: false

mac:
  target:
    # dmg is the user-facing installer; zip is required by electron-updater
    # to perform staged in-app updates on macOS.
    # arch is intentionally omitted — each CI job runs on a dedicated runner
    # (macos-14 = arm64, macos-13 = x64) and builds only its native arch,
    # avoiding hdiutil volume-name conflicts that occur when both arches are
    # built in a single process.
    - target: dmg
    - target: zip
  # icon auto-derived from build/icon.png (512x512+) — no .icns needed
  category: public.app-category.utilities
  # hardenedRuntime is required for Gatekeeper / notarization.
  # When CSC_LINK is absent (local dev) the build proceeds unsigned with a
  # self-signed ad-hoc identity — set gatekeeperAssess: false to skip the
  # local Gatekeeper check so the build doesn't fail on developer machines.
  hardenedRuntime: true
  gatekeeperAssess: false
  artifactName: TCGSnipers-${version}-${arch}.${ext}
  # Code signing: electron-builder picks up CSC_LINK (base64-encoded .p12)
  # and CSC_KEY_PASSWORD automatically. APPLE_ID + APPLE_APP_SPECIFIC_PASSWORD
  # + APPLE_TEAM_ID are used by the notarize afterSign hook below.
  entitlements: build/entitlements.mac.plist
  entitlementsInherit: build/entitlements.mac.plist

afterSign: build/notarize.cjs

dmg:
  title: TCG Snipers Installer
  window:
    width: 540
    height: 380
  contents:
    - x: 130
      y: 220
    - x: 410
      y: 220
      type: link
      path: /Applications

linux:
  target:
    - AppImage
  icon: build/icon.png
  category: Utility
  maintainer: support@tcgsnipers.com
  artifactName: TCGSnipers-${version}.${ext}

# electron-updater reads this block at runtime to discover new releases.
# `github` provider works for public repos with no token required.
# Owner/repo intentionally match license-api's GITHUB_RELEASES_REPO default
# (artifacts/license-api/src/lib/githubReleases.ts).
publish:
  - provider: github
    owner: VentureNexus
    repo: TCG-Snipers
    releaseType: release
