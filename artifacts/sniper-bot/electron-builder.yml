appId: com.tcgsnipers.app
productName: TCG Snipers
copyright: Copyright © 2026 TCG Snipers

directories:
  output: release
  buildResources: build

files:
  - dist/**
  - electron/dist/**
  - "!node_modules/**"

extraResources:
  - from: ../api-server/dist
    to: api-server
    filter:
      - "**/*.mjs"
      - "**/*.cjs"
      - "**/*.json"
      - "!**/*.map"

win:
  target:
    - target: nsis
      arch:
        - x64
  icon: build/icon.ico
  artifactName: TCGSnipers-Setup-${version}.${ext}

nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
  installerHeaderIcon: build/icon.ico
  createDesktopShortcut: true
  createStartMenuShortcut: true
  shortcutName: TCG Snipers

mac:
  target:
    - target: dmg
      arch:
        - x64
        - arm64
  icon: build/icon.icns
  category: public.app-category.utilities
  hardenedRuntime: true
  gatekeeperAssess: false
  artifactName: TCGSnipers-${version}-${arch}.${ext}

dmg:
  title: TCG Snipers Installer
  background: build/dmg-background.png
  window:
    width: 540
    height: 380
  contents:
    - x: 130
      y: 220
    - x: 410
      y: 220
      type: link
      path: /Applications

linux:
  target:
    - AppImage
  icon: build/icon.png
  category: Utility
  maintainer: support@tcgsnipers.com
  artifactName: TCGSnipers-${version}.${ext}

publish: null
