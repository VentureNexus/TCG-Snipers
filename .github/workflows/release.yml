name: Release Installers

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag (e.g. v1.0.7)"
        required: true
        type: string

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  build:
    name: Build (${{ matrix.name }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Windows x64
            os: windows-latest
            target: dist:win
          - name: macOS arm64
            os: macos-14
            target: dist:mac
          - name: macOS x64
            os: macos-13
            target: dist:mac
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Strip Replit-only overrides for cross-platform install
        shell: bash
        run: |
          node -e "
            const fs = require('fs');
            const path = 'pnpm-workspace.yaml';
            const src = fs.readFileSync(path, 'utf8');
            const out = src.replace(/^overrides:\n(?:[ \t].*\n?)*/gm, '');
            fs.writeFileSync(path, out);
            console.log('Removed overrides block. New file size:', out.length);
          "
          rm -f pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Build api-server (bundled into desktop app)
        run: pnpm --filter @workspace/api-server run build

      - name: Build and publish installer (GitHub Release)
        run: pnpm --filter @workspace/sniper-bot run ${{ matrix.target }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: List built artifacts
        shell: bash
        run: ls -la artifacts/sniper-bot/release/

      - name: Upload artifacts to workflow run
        uses: actions/upload-artifact@v4
        with:
          name: release-${{ matrix.name }}
          path: |
            artifacts/sniper-bot/release/*.exe
            artifacts/sniper-bot/release/*.dmg
            artifacts/sniper-bot/release/*.zip
            artifacts/sniper-bot/release/*.blockmap
            artifacts/sniper-bot/release/latest.yml
            artifacts/sniper-bot/release/latest-mac.yml
          retention-days: 14
