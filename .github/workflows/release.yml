name: Release Installers

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag (e.g. v1.0.7)"
        required: true
        type: string

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  # ── Step 1: create the published GitHub release before any build job runs ──
  # This avoids the race condition where two parallel matrix jobs both try to
  # create the release simultaneously and one silently fails. electron-builder
  # in the build jobs will find the release already exists and just upload.
  create-release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref }}

      - name: Resolve tag name
        id: tag
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "name=${{ inputs.tag }}" >> "$GITHUB_OUTPUT"
          else
            echo "name=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
          fi

      - name: Create published release (skip if already exists)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          TAG="${{ steps.tag.outputs.name }}"
          if gh release view "$TAG" &>/dev/null; then
            echo "Release $TAG already exists — skipping creation."
          else
            gh release create "$TAG" \
              --title "$TAG" \
              --notes-file artifacts/sniper-bot/build/release-notes.md \
              --latest
            echo "Created published release $TAG."
          fi

  # ── Step 2: build installers and upload to the existing release ──
  build:
    name: Build (${{ matrix.name }})
    needs: create-release
    timeout-minutes: 45
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Windows x64
            os: windows-latest
            target: dist:win
          - name: macOS arm64
            os: macos-14
            target: dist:mac-arm64
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref }}

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Strip Replit-only overrides for cross-platform install
        shell: bash
        run: |
          node -e "
            const fs = require('fs');
            const path = 'pnpm-workspace.yaml';
            const src = fs.readFileSync(path, 'utf8');
            const out = src.replace(/^overrides:\n(?:[ \t].*\n?)*/gm, '');
            fs.writeFileSync(path, out);
            console.log('Removed overrides block. New file size:', out.length);
          "
          rm -f pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Install Playwright Chromium (bundled into installer as extraResources)
        shell: bash
        run: |
          # Install Playwright Chromium to a fixed location so electron-builder
          # can pick it up as an extraResource. The path must match what
          # electron/main.ts looks for under process.resourcesPath.
          DEST="artifacts/sniper-bot/playwright-chromium"
          mkdir -p "$DEST"
          PLAYWRIGHT_BROWSERS_PATH="$PWD/$DEST" \
            pnpm --filter @workspace/api-server exec playwright install chromium
          echo "Playwright Chromium installed to $DEST:"
          ls -la "$DEST"

      - name: Build api-server (bundled into desktop app)
        run: pnpm --filter @workspace/api-server run build

      - name: Verify PGlite WASM assets exist in dist/
        shell: bash
        run: |
          missing=0
          for asset in postgres.wasm postgres.data; do
            if [ -f "artifacts/api-server/dist/$asset" ]; then
              size=$(du -h "artifacts/api-server/dist/$asset" | cut -f1)
              echo "✓ $asset ($size)"
            else
              echo "✗ MISSING: artifacts/api-server/dist/$asset" >&2
              missing=1
            fi
          done
          if [ "$missing" -eq 1 ]; then
            echo "::error::One or more PGlite WASM assets are missing from dist/. The build will not persist data." >&2
            exit 1
          fi

      - name: Smoke test — PGlite create/read round-trip
        run: node artifacts/api-server/scripts/smoke-test-pglite.mjs

      - name: Verify Discord OAuth credentials are present
        shell: bash
        env:
          DISCORD_OAUTH_CLIENT_ID: ${{ secrets.DISCORD_OAUTH_CLIENT_ID }}
          DISCORD_OAUTH_CLIENT_SECRET: ${{ secrets.DISCORD_OAUTH_CLIENT_SECRET }}
        run: |
          missing=0
          if [ -z "$DISCORD_OAUTH_CLIENT_ID" ]; then
            echo "::error::DISCORD_OAUTH_CLIENT_ID secret is not set. Add it under Settings → Secrets → Actions in the GitHub repo." >&2
            missing=1
          fi
          if [ -z "$DISCORD_OAUTH_CLIENT_SECRET" ]; then
            echo "::error::DISCORD_OAUTH_CLIENT_SECRET secret is not set. Add it under Settings → Secrets → Actions in the GitHub repo." >&2
            missing=1
          fi
          if [ "$missing" -eq 1 ]; then
            echo "::error::Discord OAuth credentials are required — packaged users would not be able to connect Discord." >&2
            exit 1
          fi
          echo "✓ Discord OAuth credentials are present"

      - name: Build and publish installer (GitHub Release)
        run: pnpm --filter @workspace/sniper-bot run ${{ matrix.target }} -- --publish always
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          DISCORD_OAUTH_CLIENT_ID: ${{ secrets.DISCORD_OAUTH_CLIENT_ID }}
          DISCORD_OAUTH_CLIENT_SECRET: ${{ secrets.DISCORD_OAUTH_CLIENT_SECRET }}

      - name: List built artifacts
        shell: bash
        run: ls -la artifacts/sniper-bot/release/

      - name: Upload artifacts to workflow run
        uses: actions/upload-artifact@v4
        with:
          name: release-${{ matrix.name }}
          path: |
            artifacts/sniper-bot/release/*.exe
            artifacts/sniper-bot/release/*.dmg
            artifacts/sniper-bot/release/*.zip
            artifacts/sniper-bot/release/*.blockmap
            artifacts/sniper-bot/release/latest.yml
            artifacts/sniper-bot/release/latest-mac.yml
          retention-days: 14
